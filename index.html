<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSC Master Search Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:10px;
}

h2{
text-align:center;
color:#2c3e50;
}

.container{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
margin-bottom:15px;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:2px solid #bfc9d1;
font-size:16px;
background:white;
box-sizing:border-box;
}

input:focus, textarea:focus{
border:2px solid #2c3e50;
}

.result{
background:#ecf0f1;
padding:10px;
border-radius:5px;
margin-top:10px;
white-space:pre-line;
}

.highlight{
color:#e74c3c;
font-weight:bold;
}

button{
padding:10px;
margin-top:5px;
width:100%;
border:none;
border-radius:5px;
background:#2c3e50;
color:white;
font-size:15px;
}

.small-btn{
width:auto;
padding:6px 10px;
margin-top:5px;
margin-right:5px;
background:#555;
color:white;
border:none;
border-radius:5px;
}

.delete{
background:#e74c3c;
}

.backup{
background:#25D366;
}

.brand-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:15px 0;
}

/* LOGO CIRCLE */
.logo-circle{
    width:48px;
    height:48px;
    background:#1aa179;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* LOGO TEXT */
.logo-text{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#fff;
}

/* FC */
.logo-text .fc{
    font-size:14px;
    font-weight:bold;
    line-height:1;
}

/* FINTRUST */
.logo-text .line1{
    font-size:6px;
    line-height:1;
    margin:0;
}

/* CREATIONS */
.logo-text .line2{
    font-size:6px;
    line-height:1;
    margin:0;
}

/* HEADING */
.brand-title{
    font-size:22px;
    margin:0;
    color:#2c3e50;
    font-weight:600;
}

</style>

</head>

<body>

<div class="brand-row">
    <div class="logo-circle">
        <div class="logo-text">
            <div class="fc">FC</div>
            <div class="line1">FINTRUST</div>
            <div class="line2">CREATIONS</div>
        </div>
    </div>

    <h2 class="brand-title">FinTrust Creations</h2>
</div>

<h2>CSC Master Search</h2>

<!-- ADD THIS BELOW <h2>CSC Master Search</h2> -->

<div class="container">
<h3>Today's Income</h3>
<p><b>Total: ₹ <span id="todayIncome">0</span></b></p>
<button onclick="resetIncome()">Reset Today</button>
</div>

<!-- SEARCH -->
<div class="container">
<input type="text" id="search" placeholder="Search service (PAN, GST, ITR...)" onkeyup="searchService()">
</div>

<!-- ADD -->
<div class="container">
<h3>Add New Service</h3>

<input type="text" id="newName" placeholder="Service Name">
<input type="text" id="newKeywords" placeholder="Keywords">
<input type="text" id="newDocuments" placeholder="Documents">
<textarea id="newSteps" in placeholder="Steps"></textarea>
<input type="text" id="newTime" placeholder="Time">

<!-- NEW -->
<input type="text" id="newCharge" placeholder="Charge (₹)">

<textarea id="newDownload" placeholder="Download / Print Steps (Example: Login → Enter ARN → Download → Print)"></textarea>
<textarea id="newNote" placeholder="Notes (extra details)"></textarea>

<button onclick="addService()">Add Service</button>
</div>

<!-- EDIT -->
<div class="container">
<h3>Edit Service</h3>

<input type="hidden" id="editIndex">

<input type="text" id="editName" placeholder="Service Name">
<input type="text" id="editKeywords" placeholder="Keywords">
<input type="text" id="editDocuments" placeholder="Documents">
<textarea id="editSteps" placeholder="Steps"></textarea>
<input type="text" id="editTime" placeholder="Time">

<!-- NEW -->
<input type="text" id="editCharge" placeholder="Charge (₹)">

<textarea id="editDownload" placeholder="Download / Print Steps"></textarea>
<textarea id="editNote" placeholder="Notes"></textarea>

<button onclick="updateService()">Update Service</button>
</div>

<!-- BACKUP -->
<div class="container">
<h3>Backup & Restore</h3>

<button class="backup" onclick="backupWhatsApp()">Backup to WhatsApp</button>

<textarea id="restoreBox" placeholder="Paste backup data here"></textarea>

<button onclick="restoreFromText()">Restore Data</button>
</div>

<!-- RESULTS -->
<div class="container">
<h3>Search Results</h3>
<div id="output"></div>
</div>

<script>

let services = JSON.parse(localStorage.getItem("services")) || [];

function saveLocal(){
localStorage.setItem("services", JSON.stringify(services));
}

/* SEARCH */
function searchService(){

let input = document.getElementById("search").value.toLowerCase();
let output = "";

/* NEW: SORT WITHOUT CHANGING ORIGINAL */
let sorted = [...services].sort((a,b)=>a.name.localeCompare(b.name));

sorted.forEach((s)=>{
let i = services.indexOf(s);

if(s.name.toLowerCase().includes(input) || s.keywords.includes(input)){
output += `
<div class="result">
<h3>${s.name}</h3>

<b>Documents:</b>\n${s.documents}\n
<b>Steps:</b>\n${s.steps}\n
<b>Time:</b> ${s.time}\n

${s.charge ? `<b>Charge:</b> ₹${s.charge}\n` : ""}

${s.download ? `<b>Download / Print Steps:</b>\n${s.download}\n` : ""}

${s.note ? `<b>Note:</b>\n${s.note}\n` : ""}

<button class="small-btn" onclick="addIncome(${s.charge || 0})">Add ₹</button>
<button class="small-btn" onclick="loadEdit(${i})">Edit</button>
<button class="small-btn delete" onclick="deleteService(${i})">Delete</button>

</div>
`;
}
});

document.getElementById("output").innerHTML = output || "No service found";
}

/* ADD */
function addService(){
let name = document.getElementById("newName").value;

if(name===""){
alert("Enter Service Name");
return;
}

services.push({
name,
keywords: document.getElementById("newKeywords").value,
documents: document.getElementById("newDocuments").value,
steps: document.getElementById("newSteps").value,
time: document.getElementById("newTime").value,

/* NEW */
charge: document.getElementById("newCharge").value,

download: document.getElementById("newDownload").value,
note: document.getElementById("newNote").value
});

saveLocal();
clearAddForm();
searchService();
}

/* EDIT LOAD */
function loadEdit(i){
let s = services[i];

document.getElementById("editIndex").value = i;
document.getElementById("editName").value = s.name;
document.getElementById("editKeywords").value = s.keywords;
document.getElementById("editDocuments").value = s.documents;
document.getElementById("editSteps").value = s.steps;
document.getElementById("editTime").value = s.time;

/* NEW */
document.getElementById("editCharge").value = s.charge || "";

document.getElementById("editDownload").value = s.download || "";
document.getElementById("editNote").value = s.note || "";
}

/* UPDATE */
function updateService(){
let i = document.getElementById("editIndex").value;

if(i===""){
alert("Select service to edit");
return;
}

services[i] = {
name: document.getElementById("editName").value,
keywords: document.getElementById("editKeywords").value,
documents: document.getElementById("editDocuments").value,
steps: document.getElementById("editSteps").value,
time: document.getElementById("editTime").value,

/* NEW */
charge: document.getElementById("editCharge").value,

download: document.getElementById("editDownload").value,
note: document.getElementById("editNote").value
};

saveLocal();
clearEditForm();
searchService();
}

/* DELETE */
function deleteService(i){
if(confirm("Delete this service?")){
services.splice(i,1);
saveLocal();
searchService();
}
}

/* BACKUP */
function backupWhatsApp(){
let data = JSON.stringify(services);
let message = encodeURIComponent("CSC Backup:\n" + data);
window.open("https://wa.me/?text=" + message, "_blank");
}

/* RESTORE */
function restoreFromText(){
let text = document.getElementById("restoreBox").value;

if(text.trim() === ""){
alert("Paste backup data");
return;
}

try{
text = text.replace("CSC Backup:", "").trim();
services = JSON.parse(text);

saveLocal();
searchService();

alert("Data Restored Successfully");

}catch(e){
alert("Invalid backup data");
}
}

/* CLEAR */
function clearAddForm(){
document.getElementById("newName").value="";
document.getElementById("newKeywords").value="";
document.getElementById("newDocuments").value="";
document.getElementById("newSteps").value="";
document.getElementById("newTime").value="";
document.getElementById("newCharge").value="";
document.getElementById("newDownload").value="";
document.getElementById("newNote").value="";
}

function clearEditForm(){
document.getElementById("editIndex").value="";
document.getElementById("editName").value="";
document.getElementById("editKeywords").value="";
document.getElementById("editDocuments").value="";
document.getElementById("editSteps").value="";
document.getElementById("editTime").value="";
document.getElementById("editCharge").value="";
document.getElementById("editDownload").value="";
document.getElementById("editNote").value="";
}

searchService();

/* DAILY INCOME SYSTEM */

function getTodayKey(){
let d = new Date();
return "income_" + d.toISOString().slice(0,10);
}

function loadIncome(){
let total = localStorage.getItem(getTodayKey()) || 0;
document.getElementById("todayIncome").innerText = total;
}

function addIncome(amount){

// If charge not entered, ask manually
if(!amount || amount == 0){
let input = prompt("Enter amount ₹:");
if(input === null) return;
amount = parseFloat(input);
if(isNaN(amount)){
alert("Invalid amount");
return;
}
}

let key = getTodayKey();
let current = parseFloat(localStorage.getItem(key)) || 0;

current += amount;

localStorage.setItem(key, current);
loadIncome();
}

function resetIncome(){
if(confirm("Reset today's income?")){
localStorage.setItem(getTodayKey(), 0);
loadIncome();
}
}

/* LOAD ON START */
loadIncome();

</script>

<p class="ft-copy">
    © 2026 FinTrust Creations. All Rights Reserved.
</p>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());

document.onkeydown = function(e){
if(e.keyCode == 123) return false; // F12
if(e.ctrlKey && e.shiftKey && e.keyCode == 73) return false; // Ctrl+Shift+I
if(e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U
}
</script>

</body>
</html>
